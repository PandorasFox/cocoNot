services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - offdata:/data
    environment:
      PORT: "8080"
      FRONTEND_DIR: /app/static
      DATA_DIR: /data
      INGEST_INTERVAL: "6h"

  # Run with: docker compose run --rm ingest
  ingest:
    build: .
    command: ["./coconutfree", "ingest"]
    volumes:
      - offdata:/data
    environment:
      DATA_DIR: /data

  # Local HTTPS reverse proxy for phone testing.
  # Proxies to Vite (5173) and Go backend (8080) running on the host.
  #
  # Usage:
  #   1. Start your dev servers normally (npm run dev + go run)
  #   2. docker compose up caddy
  #   3. Open https://<your-lan-ip> on your phone
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - dev

volumes:
  offdata:
  caddy_data:
  caddy_config:
