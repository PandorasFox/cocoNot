services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - offdata:/data
    environment:
      DATABASE_URL: postgres://coconutfree:coconutfree@db:5432/coconutfree?sslmode=disable
      PORT: "8080"
      FRONTEND_DIR: /app/static
      MIGRATIONS_DIR: file:///app/migrations
      DATA_DIR: /data
      INGEST_INTERVAL: "6h"
    depends_on:
      db:
        condition: service_healthy

  # Run with: docker compose run --rm ingest
  # Won't start with `docker compose up app` — only runs when targeted directly
  ingest:
    build: .
    command: ["./coconutfree", "ingest"]
    volumes:
      - offdata:/data
    environment:
      DATABASE_URL: postgres://coconutfree:coconutfree@db:5432/coconutfree?sslmode=disable
      MIGRATIONS_DIR: file:///app/migrations
      DATA_DIR: /data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coconutfree
      POSTGRES_PASSWORD: coconutfree
      POSTGRES_DB: coconutfree
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coconutfree"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  offdata:
