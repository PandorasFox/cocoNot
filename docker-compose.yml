services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - offdata:/data
      - pgdata:/var/lib/postgresql/data
    environment:
      PORT: "8080"
      FRONTEND_DIR: /app/static
      MIGRATIONS_DIR: file:///app/migrations
      DATA_DIR: /data
      INGEST_INTERVAL: "6h"

  # Run with: docker compose run --rm ingest
  # Won't start with `docker compose up app` — only runs when targeted directly
  ingest:
    build: .
    command: ["./coconutfree", "ingest"]
    volumes:
      - offdata:/data
      - pgdata:/var/lib/postgresql/data
    environment:
      MIGRATIONS_DIR: file:///app/migrations
      DATA_DIR: /data

volumes:
  pgdata:
  offdata:
